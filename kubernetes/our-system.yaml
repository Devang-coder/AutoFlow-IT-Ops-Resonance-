# QUICK REFERENCE — Deploy & Verify:
#
#   1. Deploy:
#      kubectl apply -f our-system.yaml
#
#   2. Watch pods come up:
#      kubectl get pods -n monitoring -w
#
#   3. Access Prometheus UI:
#      kubectl port-forward svc/our-prometheus -n monitoring 9090:9090
#      # → http://localhost:9090
#      # →  Status > Targets  (check all scrapers are UP)
#      # →  Alerts            (HighCPUUsage should appear when CPU > 0.4)
#
#   4. Access Alertmanager UI:
#      kubectl port-forward svc/our-alertmanager -n monitoring 9093:9093
#      # → http://localhost:9093
#
#   5. Trigger a CPU alert (see stress-test.yaml):
#      kubectl apply -f stress-test.yaml
#      # Wait ~30s → alert fires in Prometheus → forwarded to Alertmanager
#
#   6. Teardown (does NOT touch any existing cluster components):
#      kubectl delete namespace monitoring
#
